name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            client/ts/package-lock.json
            web/package-lock.json

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install & Build TS SDK Client
        run: |
          npm ci --prefix client/ts
          buf generate --template '{"version":"v1","plugins":[{"name":"es","path":"client/ts/node_modules/.bin/protoc-gen-es","out":"client/ts/src/gen","opt":"target=ts"}]}'
          npm run build --prefix client/ts

      - name: Install & Build Web Dashboard
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm ci --prefix web
          npm run build --prefix web

      - name: Merge docs folder (for proto/sdk docs)
        run: |
          # Copy generated documentation from docs/ to web/dist/ so they are served together
          mkdir -p web/dist/proto
          mkdir -p web/dist/sdk
          cp -r docs/proto/* web/dist/proto/ || true
          cp -r docs/sdk/* web/dist/sdk/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
