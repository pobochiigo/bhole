version: v1
plugins:
  - name: go
    out: proto
    opt: paths=source_relative
  - name: connect-go
    out: proto
    opt: paths=source_relative
  - name: es
    path: client/ts/node_modules/.bin/protoc-gen-es
    out: client/ts/src/gen
    opt: target=ts
  - name: doc
    path: /Users/28soft/go/bin/protoc-gen-doc
    out: docs/proto
    opt: html,index.html


