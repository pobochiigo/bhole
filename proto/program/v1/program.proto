syntax = "proto3";

package program.v1;

option go_package = "github.com/pobochiigo/bhole/proto/program/v1;programv1";

message AgencyMini {
  string abbrev = 1;
  int32 id = 2;
  string name = 3;
  string response_mode = 4;
  AgencyType type = 5;
  string url = 6;
}

message AgencyType {
  int32 id = 1;
  string name = 2;
}

message Image {
  optional string credit = 1;
  int32 id = 2;
  string image_url = 3;
  ImageLicense license = 4;
  string name = 5;
  bool single_use = 6;
  string thumbnail_url = 7;
  repeated ImageVariant variants = 8;
}

message ImageLicense {
  int32 id = 1;
  optional string link = 2;
  string name = 3;
  int32 priority = 4;
}

message ImageVariant {
  int32 id = 1;
  string image_url = 2;
  ImageVariantType type = 3;
}

message ImageVariantType {
  int32 id = 1;
  string name = 2;
}

message MissionPatch {
  AgencyMini agency = 1;
  int32 id = 2;
  string image_url = 3;
  string name = 4;
  int32 priority = 5;
  string response_mode = 6;
}

message Program {
  repeated AgencyMini agencies = 1;
  optional string description = 2;
  optional string end_date = 3;
  int32 id = 4;
  Image image = 5;
  optional string info_url = 6;
  repeated MissionPatch mission_patches = 7;
  string name = 8;
  string response_mode = 9;
  optional string start_date = 10;
  ProgramType type = 11;
  string url = 12;
  optional string wiki_url = 13;
}

message ProgramType {
  int32 id = 1;
  string name = 2;
}

message ListProgramsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string search = 3;
  string mode = 4;
}

message ListProgramsResponse {
  int32 count = 1;
  string next = 2;
  string previous = 3;
  repeated Program results = 4;
}

message GetProgramRequest {
  int32 id = 1;
  string mode = 2;
}

message GetProgramResponse {
  Program program = 1;
}

service ProgramService {
  rpc ListPrograms(ListProgramsRequest) returns (ListProgramsResponse);
  rpc GetProgram(GetProgramRequest) returns (GetProgramResponse);
}
