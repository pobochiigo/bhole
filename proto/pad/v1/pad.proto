syntax = "proto3";

package pad.v1;

option go_package = "com.gitlab/pobochiigo/bhole/proto/pad/v1;padv1";

message AgencyNormal {
  string abbrev = 1;
  optional string administrator = 2;
  repeated Country country = 3;
  optional string description = 4;
  bool featured = 5;
  optional int32 founding_year = 6;
  int32 id = 7;
  Image image = 8;
  string launchers = 9;
  Image logo = 10;
  string name = 11;
  optional string parent = 12;
  string response_mode = 13;
  Image social_logo = 14;
  string spacecraft = 15;
  AgencyType type = 16;
  string url = 17;
}

message AgencyType {
  int32 id = 1;
  string name = 2;
}

message CelestialBodyDetailed {
  bool atmosphere = 1;
  optional string description = 2;
  optional float diameter = 3;
  int32 failed_landings = 4;
  int32 failed_launches = 5;
  optional float gravity = 6;
  int32 id = 7;
  Image image = 8;
  optional string length_of_day = 9;
  optional float mass = 10;
  string name = 11;
  string response_mode = 12;
  int32 successful_landings = 13;
  int32 successful_launches = 14;
  int32 total_attempted_landings = 15;
  int32 total_attempted_launches = 16;
  CelestialBodyType type = 17;
  optional string wiki_url = 18;
}

message CelestialBodyType {
  int32 id = 1;
  string name = 2;
}

message Country {
  string alpha_2_code = 1;
  string alpha_3_code = 2;
  int32 id = 3;
  string name = 4;
  string nationality_name = 5;
  string nationality_name_composed = 6;
}

message Image {
  optional string credit = 1;
  int32 id = 2;
  string image_url = 3;
  ImageLicense license = 4;
  string name = 5;
  bool single_use = 6;
  string thumbnail_url = 7;
  repeated ImageVariant variants = 8;
}

message ImageLicense {
  int32 id = 1;
  optional string link = 2;
  string name = 3;
  int32 priority = 4;
}

message ImageVariant {
  int32 id = 1;
  string image_url = 2;
  ImageVariantType type = 3;
}

message ImageVariantType {
  int32 id = 1;
  string name = 2;
}

message Location {
  bool active = 1;
  CelestialBodyDetailed celestial_body = 2;
  Country country = 3;
  optional string description = 4;
  int32 id = 5;
  Image image = 6;
  optional float latitude = 7;
  optional float longitude = 8;
  optional string map_image = 9;
  string name = 10;
  string response_mode = 11;
  string timezone_name = 12;
  optional int32 total_landing_count = 13;
  optional int32 total_launch_count = 14;
  string url = 15;
}

message Pad {
  bool active = 1;
  repeated AgencyNormal agencies = 2;
  Country country = 3;
  optional string description = 4;
  optional string fastest_turnaround = 5;
  int32 id = 6;
  Image image = 7;
  optional string info_url = 8;
  optional float latitude = 9;
  Location location = 10;
  optional float longitude = 11;
  optional string map_image = 12;
  optional string map_url = 13;
  string name = 14;
  optional int32 orbital_launch_attempt_count = 15;
  optional int32 total_launch_count = 16;
  string url = 17;
  optional string wiki_url = 18;
}

message ListPadsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string search = 3;
  string mode = 4;
}

message ListPadsResponse {
  int32 count = 1;
  string next = 2;
  string previous = 3;
  repeated Pad results = 4;
}

message GetPadRequest {
  int32 id = 1;
  string mode = 2;
}

message GetPadResponse {
  Pad pad = 1;
}

service PadService {
  rpc ListPads(ListPadsRequest) returns (ListPadsResponse);
  rpc GetPad(GetPadRequest) returns (GetPadResponse);
}
