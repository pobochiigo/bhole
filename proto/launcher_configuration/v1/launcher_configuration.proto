syntax = "proto3";

package launcher_configuration.v1;

option go_package = "com.gitlab/pobochiigo/bhole/proto/launcher_configuration/v1;launcher_configurationv1";

message AgencyDetailed {
  string abbrev = 1;
  optional string administrator = 2;
  optional int32 attempted_landings = 3;
  optional int32 attempted_landings_payload = 4;
  optional int32 attempted_landings_spacecraft = 5;
  optional int32 consecutive_successful_landings = 6;
  optional int32 consecutive_successful_launches = 7;
  repeated Country country = 8;
  optional string description = 9;
  optional int32 failed_landings = 10;
  optional int32 failed_landings_payload = 11;
  optional int32 failed_landings_spacecraft = 12;
  optional int32 failed_launches = 13;
  bool featured = 14;
  optional int32 founding_year = 15;
  int32 id = 16;
  Image image = 17;
  optional string info_url = 18;
  string launchers = 19;
  Image logo = 20;
  string name = 21;
  optional string parent = 22;
  optional int32 pending_launches = 23;
  string response_mode = 24;
  Image social_logo = 25;
  repeated SocialMediaLink social_media_links = 26;
  string spacecraft = 27;
  optional int32 successful_landings = 28;
  optional int32 successful_landings_payload = 29;
  optional int32 successful_landings_spacecraft = 30;
  optional int32 successful_launches = 31;
  optional int32 total_launch_count = 32;
  AgencyType type = 33;
  string url = 34;
  optional string wiki_url = 35;
}

message AgencyMini {
  string abbrev = 1;
  int32 id = 2;
  string name = 3;
  string response_mode = 4;
  AgencyType type = 5;
  string url = 6;
}

message AgencyNormal {
  string abbrev = 1;
  optional string administrator = 2;
  repeated Country country = 3;
  optional string description = 4;
  bool featured = 5;
  optional int32 founding_year = 6;
  int32 id = 7;
  Image image = 8;
  string launchers = 9;
  Image logo = 10;
  string name = 11;
  optional string parent = 12;
  string response_mode = 13;
  Image social_logo = 14;
  string spacecraft = 15;
  AgencyType type = 16;
  string url = 17;
}

message AgencyType {
  int32 id = 1;
  string name = 2;
}

message Country {
  string alpha_2_code = 1;
  string alpha_3_code = 2;
  int32 id = 3;
  string name = 4;
  string nationality_name = 5;
  string nationality_name_composed = 6;
}

message Image {
  optional string credit = 1;
  int32 id = 2;
  string image_url = 3;
  ImageLicense license = 4;
  string name = 5;
  bool single_use = 6;
  string thumbnail_url = 7;
  repeated ImageVariant variants = 8;
}

message ImageLicense {
  int32 id = 1;
  optional string link = 2;
  string name = 3;
  int32 priority = 4;
}

message ImageVariant {
  int32 id = 1;
  string image_url = 2;
  ImageVariantType type = 3;
}

message ImageVariantType {
  int32 id = 1;
  string name = 2;
}

message LauncherConfiguration {
  bool active = 1;
  string alias = 2;
  optional float apogee = 3;
  optional int32 attempted_landings = 4;
  optional int32 consecutive_successful_landings = 5;
  optional int32 consecutive_successful_launches = 6;
  string description = 7;
  optional float diameter = 8;
  optional int32 failed_landings = 9;
  optional int32 failed_launches = 10;
  repeated LauncherConfigFamilyDetailed families = 11;
  optional string fastest_turnaround = 12;
  string full_name = 13;
  optional float geo_capacity = 14;
  optional float gto_capacity = 15;
  int32 id = 16;
  Image image = 17;
  optional string info_url = 18;
  bool is_placeholder = 19;
  optional int32 launch_cost = 20;
  optional float launch_mass = 21;
  optional float length = 22;
  optional float leo_capacity = 23;
  optional string maiden_flight = 24;
  AgencyDetailed manufacturer = 25;
  optional int32 max_stage = 26;
  optional int32 min_stage = 27;
  string name = 28;
  optional int32 pending_launches = 29;
  repeated ProgramNormal program = 30;
  string response_mode = 31;
  bool reusable = 32;
  optional float sso_capacity = 33;
  optional int32 successful_landings = 34;
  optional int32 successful_launches = 35;
  optional float to_thrust = 36;
  optional int32 total_launch_count = 37;
  string url = 38;
  string variant = 39;
  optional string wiki_url = 40;
}

message LauncherConfigFamilyDetailed {
  bool active = 1;
  optional int32 attempted_landings = 2;
  optional int32 consecutive_successful_landings = 3;
  optional int32 consecutive_successful_launches = 4;
  string description = 5;
  optional int32 failed_landings = 6;
  optional int32 failed_launches = 7;
  int32 id = 8;
  optional string maiden_flight = 9;
  repeated AgencyDetailed manufacturer = 10;
  string name = 11;
  LauncherConfigFamilyNormal parent = 12;
  optional int32 pending_launches = 13;
  string response_mode = 14;
  optional int32 successful_landings = 15;
  optional int32 successful_launches = 16;
  optional int32 total_launch_count = 17;
}

message LauncherConfigFamilyMini {
  int32 id = 1;
  string name = 2;
  string response_mode = 3;
}

message LauncherConfigFamilyNormal {
  int32 id = 1;
  repeated AgencyNormal manufacturer = 2;
  string name = 3;
  LauncherConfigFamilyMini parent = 4;
  string response_mode = 5;
}

message MissionPatch {
  AgencyMini agency = 1;
  int32 id = 2;
  string image_url = 3;
  string name = 4;
  int32 priority = 5;
  string response_mode = 6;
}

message ProgramNormal {
  repeated AgencyMini agencies = 1;
  optional string description = 2;
  optional string end_date = 3;
  int32 id = 4;
  Image image = 5;
  optional string info_url = 6;
  repeated MissionPatch mission_patches = 7;
  string name = 8;
  string response_mode = 9;
  optional string start_date = 10;
  ProgramType type = 11;
  string url = 12;
  optional string wiki_url = 13;
}

message ProgramType {
  int32 id = 1;
  string name = 2;
}

message SocialMedia {
  int32 id = 1;
  Image logo = 2;
  string name = 3;
  optional string url = 4;
}

message SocialMediaLink {
  int32 id = 1;
  SocialMedia social_media = 2;
  optional string url = 3;
}

message ListLauncherConfigurationsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string search = 3;
  string mode = 4;
}

message ListLauncherConfigurationsResponse {
  int32 count = 1;
  string next = 2;
  string previous = 3;
  repeated LauncherConfiguration results = 4;
}

message GetLauncherConfigurationRequest {
  int32 id = 1;
  string mode = 2;
}

message GetLauncherConfigurationResponse {
  LauncherConfiguration launcher_configuration = 1;
}

service LauncherConfigurationService {
  rpc ListLauncherConfigurations(ListLauncherConfigurationsRequest) returns (ListLauncherConfigurationsResponse);
  rpc GetLauncherConfiguration(GetLauncherConfigurationRequest) returns (GetLauncherConfigurationResponse);
}
